// Dégradé bleu pour PAV (clair → foncé selon population captée)
function pavColor(val) {
  const min = 49, max = 440;
  const t = Math.max(0, Math.min(1, (val - min) / (max - min)));
  // #cfe2ff → #6ea8fe → #0d6efd → #052c65
  const stops = [
    [0,   [207, 226, 255]],
    [0.33,[110, 168, 254]],
    [0.66,[ 13, 110, 253]],
    [1,   [  5,  44, 101]]
  ];
  let c0, c1, localT;
  for (let i = 0; i < stops.length - 1; i++) {
    if (t <= stops[i+1][0]) {
      c0 = stops[i][1]; c1 = stops[i+1][1];
      localT = (t - stops[i][0]) / (stops[i+1][0] - stops[i][0]);
      break;
    }
  }
  if (!c0) { c0 = c1 = stops[stops.length-1][1]; localT = 0; }
  return `rgb(${Math.round(c0[0]+(c1[0]-c0[0])*localT)},${Math.round(c0[1]+(c1[1]-c0[1])*localT)},${Math.round(c0[2]+(c1[2]-c0[2])*localT)})`;
}

    const html = `<div class="popup-inner">
      <div class="popup-title">PAV #${p.id_pav}</div>
      <div class="popup-address">📍 ${p.localisatio || 'Adresse inconnue'}</div>
      <div class="popup-pop">
        <div class="popup-pop-icon">👥</div>
        <div>
          <div class="popup-pop-num">${Number(pop).toLocaleString('fr-FR')}</div>
          <div class="popup-pop-label">habitants captés</div>
        </div>
      </div>
      <div class="popup-meta">
        <div class="popup-chip"><div class="popup-chip-label">% commune</div><div class="popup-chip-val">${pct} %</div></div>
        <div class="popup-chip"><div class="popup-chip-label">Vol. max</div><div class="popup-chip-val">${p.vol_max_sum != null ? p.vol_max_sum + ' L' : '—'}</div></div>
        <div class="popup-chip"><div class="popup-chip-label">Dist. moy.</div><div class="popup-chip-val">${p.moyenne_dist_tot != null ? Math.round(p.moyenne_dist_tot) + ' m' : '—'}</div></div>
        <div class="popup-chip"><div class="popup-chip-label">Dist. max</div><div class="popup-chip-val">${p.distance_max != null ? p.distance_max + ' m' : '—'}</div></div>
      </div>
    </div>`;
    popup.setLngLat(lngLat).setHTML(html).addTo(map);
  });

  // ── Popup Bâtiment (tooltip léger) ──
  const batPopup = new maplibregl.Popup({ closeButton: false, maxWidth: '200px', offset: 8, className: 'bat-popup' });
  map.on('click', 'bat-fill', (e) => {
    // Ne pas déclencher si on clique sur un PAV
    if (map.queryRenderedFeatures(e.point, { layers: ['pav-dot'] }).length) return;
    const p = e.features[0].properties;
    const pop = p.pop_bat != null ? Number(p.pop_bat).toLocaleString('fr-FR', {maximumFractionDigits:0}) : '—';
    const html = `<div class="popup-inner" style="min-width:0">
      <div class="popup-pop" style="margin-bottom:0">
        <div class="popup-pop-icon">🏠</div>
        <div>
          <div class="popup-pop-num">${pop}</div>
          <div class="popup-pop-label">hab. estimés</div>
        </div>
      </div>
    </div>`;
    batPopup.setLngLat(e.lngLat).setHTML(html).addTo(map);
  });
  map.on('mouseleave', 'bat-fill', () => batPopup.remove());
});
</script>
</body>
</html>
